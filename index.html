<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandma's Splattered Spoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Grandma's Splattered Spoon</h1>
        <p>A digital home for Grandma's well-loved recipes</p>
    </header>

    <section id="recipe-input-zone">
        <h2>Add to the Rolodex</h2>
        <div class="input-group">
            <textarea id="text-input" placeholder="Paste your recipe ingredients and directions here..."></textarea>

            <div class="upload-controls">

                <label for="image-upload" class="custom-file-upload" style="background-color: #6b8e93; color: white;">
                    🔍 Scan Text From Image
                </label>
                <input type="file" id="image-upload" accept="image/*">

                <label for="card-photo-upload" class="custom-file-upload">
                    🖼️ Add Card Photo
                </label>
                <input type="file" id="card-photo-upload" accept="image/*">

                <select id="category-select">
                    <option value="chicken">🍗 Chicken</option>
                    <option value="beef">🥩 Beef</option>
                    <option value="baked-goods">🍞 Baking</option>
                    <option value="desserts">🍰 Sweets</option>
                    <option value="drinks">🍹 Drinks</option>
                </select>

                <button id="save-btn">Save Vintage Card</button>

                <hr style="width: 100%; border: none; border-top: 1px dashed #4a3c31; margin: 10px 0;">

                <div class="category-creator" style="display: flex; gap: 5px; width: 100%;">
                    <input type="text" id="new-category-input" placeholder="New category name..." style="flex: 1; padding: 5px; font-family: inherit; border: 2px solid #4a3c31; background: #fbf7ed;">
                    <button id="add-category-btn" type="button" style="padding: 5px 10px; font-size: 0.8rem;">+ Add Tab</button>
                </div>

                <div id="tab-editor-zone" style="display: none; gap: 5px; width: 100%; border: 1px dashed #4a3c31; padding: 5px; box-sizing: border-box;">
                    <input type="text" id="edit-category-input" style="flex: 1; padding: 5px; font-family: inherit; border: 2px solid #4a3c31; background: #fff;">
                    <button id="update-category-btn" type="button" style="padding: 5px 10px; font-size: 0.8rem; background-color: #8ba88f; color: white;">Fix Tab</button>
                    <button id="cancel-category-btn" type="button" style="padding: 5px 10px; font-size: 0.8rem; background-color: #e6dfcb;">X</button>
                </div>
            </div> </div> </section>

    <nav id="category-nav">
        <div class="heading-card" data-category="all">All</div>
        <div class="heading-card" data-category="chicken">🍗 Chicken</div>
        <div class="heading-card" data-category="beef">🥩 Beef</div>
        <div class="heading-card" data-category="baked-goods">🍞 Baking</div>
        <div class="heading-card" data-category="desserts">🍰 Sweets</div>
        <div class="heading-card" data-category="drinks">🍹 Drinks</nav>
    </nav>

    <main id="recipe-grid"></main>

    <script src="[https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js](https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js)"></script>
    <script src="app.js"></script>
</body>
</html>
